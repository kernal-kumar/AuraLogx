<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AuraLogix | Route Optimization</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#020617] text-slate-100">
    <div class="flex h-screen w-full">
        <aside class="w-20 flex flex-col items-center py-6 border-r border-slate-800 bg-slate-900/80">
            <nav class="flex flex-col gap-8">
                <a href="index.html"><i data-lucide="layout-grid" class="text-slate-500"></i></a>
                <a href="fleet.html"><i data-lucide="truck" class="text-slate-500"></i></a>
                <a href="routes.html"><i data-lucide="map-pin" class="text-blue-400"></i></a>
                <a href="analytics.html"><i data-lucide="database" class="text-slate-500"></i></a>
            </nav>
        </aside>

        <main class="flex-1 p-8">
            <h1 class="text-3xl font-bold mb-4">Route Optimization</h1>
            <p class="text-slate-400 mb-8">Gemini AI analyzes patterns to predict delays with 94% accuracy[cite: 127].</p>

            <div class="glass p-6 rounded-3xl border border-red-500/20 bg-red-500/5 mb-6">
                <div class="flex items-center gap-4 mb-4">
                    <div class="p-3 bg-red-500/20 rounded-xl text-red-500">
                        <i data-lucide="alert-triangle"></i>
                    </div>
                    <div>
                        <h4 class="font-bold">Bottleneck Detected: Port Sector 4</h4>
                        <p class="text-xs text-slate-400">Estimated delay: 45 minutes [cite: 126]</p>
                    </div>
                </div>
                <button class="w-full bg-red-600 py-2 rounded-xl text-sm font-bold">Apply AI Recommended Reroute</button>
            </div>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
